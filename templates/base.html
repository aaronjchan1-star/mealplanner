<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pantry{% endblock %} — Mealplanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="grain"></div>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">
      <span class="brand-mark">◐</span>
      <span class="brand-name">Mealplanner</span>
      <span class="brand-sub">a quieter kitchen</span>
    </a>
    <nav class="nav">
      <a href="{{ url_for('plan_new') }}">Plan</a>
      <a href="{{ url_for('toddler') }}">Toddler</a>
      <a href="{{ url_for('pantry') }}">Pantry</a>
      <a href="{{ url_for('dislikes') }}">Dislikes</a>
      <a href="{{ url_for('schedules') }}">Recurring</a>
      <a href="{{ url_for('settings') }}">Settings</a>
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer class="foot">
    <span>self-hosted on a Raspberry Pi · {{ "%Y"|format() if false else "" }}</span>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
